<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thank You</title>

<script defer>
document.addEventListener("DOMContentLoaded", () => {

    const params = new URLSearchParams(window.location.search);

    document.getElementById("fname").textContent =
        params.get("firstname");

    document.getElementById("lname").textContent =
        params.get("lastname");

    document.getElementById("email").textContent =
        params.get("email");

    document.getElementById("phone").textContent =
        params.get("phone");

    document.getElementById("business").textContent =
        params.get("business");

    document.getElementById("timestamp").textContent =
        params.get("timestamp");
});
</script>

<style>
body{
    font-family: Arial, sans-serif;
    max-width:800px;
    margin:auto;
    padding:2rem;
}

.info{
    border:1px solid #ccc;
    padding:1rem;
    border-radius:8px;
}
</style>

</head>
<body>

<header>
    <h1>Thank You!</h1>
</header>

<main>

    <p>Thank you for submitting your Chamber membership application.</p>

    <div class="info">

        <p><strong>First Name:</strong> <span id="fname"></span></p>

        <p><strong>Last Name:</strong> <span id="lname"></span></p>

        <p><strong>Email:</strong> <span id="email"></span></p>

        <p><strong>Phone:</strong> <span id="phone"></span></p>

        <p><strong>Business:</strong> <span id="business"></span></p>

        <p><strong>Submitted:</strong> <span id="timestamp"></span></p>

    </div>

</main>

<footer>
    <p>&copy; 2026 Chamber of Commerce</p>
</footer>

</body>
</html>
