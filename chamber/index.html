<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Orem Chamber of Commerce</title>

<meta name="description" content="Official Chamber of Commerce of Orem Utah">
<meta name="author" content="Jose Sebastian Escobar Salinas">

<link rel="stylesheet" href="styles/small.css">
<link rel="stylesheet" href="styles/large.css">

<script src="scripts/navigation.js" defer></script>
<script src="scripts/weather.js" defer></script>
<script src="scripts/spotlight.js" defer></script>
</head>

<body>

<header>
    <img src="images/logo.webp" alt="Orem Chamber Logo" width="80" height="80">
    <span>Orem Chamber of Commerce</span>

    <button id="menu"></button>

    <nav>
        <ul class="navigation">
            <li><a href="index.html" class="active">Home</a></li>
            <li><a href="directory.html">Directory</a></li>
            <li><a href="join.html">Join</a></li>
            <li><a href="#">Discover</a></li>
        </ul>
    </nav>
</header>

<main>

    <!-- HERO -->

    <section class="hero">
        <picture>
            <img src="images/hero.webp"
                 alt="Orem City"
                 loading="lazy">
        </picture>

        <a href="join.html" class="cta">
            Join the Chamber
        </a>
    </section>

    <!-- INFO GRID -->

    <section class="home-grid">

        <article class="card">
            <h2>Current Events</h2>

            <p>
                Summer Business Networking Event -
                June 15 at Orem Convention Center.
            </p>

            <p>
                Entrepreneurship Workshop -
                June 22.
            </p>
        </article>

        <article class="card weather">
            <h2>Weather</h2>

            <p id="current-temp"></p>

            <p id="weather-desc"></p>

            <div id="forecast"></div>
        </article>

    </section>

    <!-- SPOTLIGHTS -->

    <section class="spotlights">
        <h2>Business Spotlights</h2>

        <div id="spotlight-container"></div>
    </section>

<footer>
    <p>&copy; 2026 Orem Chamber of Commerce</p>
</footer>
