<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Thank You</title>

<meta name="description" content="Budget form submission confirmation">
<meta name="author" content="Jose Sebastian Escobar Salinas">

<link rel="stylesheet" href="css/styles.css">
<link rel="stylesheet" href="css/large.css">

<script defer>
window.addEventListener("DOMContentLoaded", () => {
    const params = new URLSearchParams(window.location.search);

    document.getElementById("name").textContent =
        params.get("name");

    document.getElementById("income").textContent =
        params.get("income");

    document.getElementById("goal").textContent =
        params.get("goal");

    document.getElementById("category").textContent =
        params.get("category");
});
</script>

</head>

<body>

<header>
<h1>Thank You!</h1>
</header>

<main>

<h2>Your Budget Information</h2>

<p><strong>Name:</strong> <span id="name"></span></p>

<p><strong>Monthly Income:</strong> $<span id="income"></span></p>

<p><strong>Savings Goal:</strong> $<span id="goal"></span></p>

<p><strong>Favorite Category:</strong> <span id="category"></span></p>

<p>
Your financial goals have been successfully submitted.
</p>

<a href="index.html">Return Home</a>

</main>

<footer>

<p>©2026 Finance Hub</p>

</footer>

</body>
</html>
