<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Thank You</title>

<link rel="stylesheet" href="styles/styles.css">
<link rel="stylesheet" href="styles/large.css">

</head>

<body>

<header>

<h1>Finance Hub</h1>

</header>

<main>

<h2>Thank You!</h2>

<p>Your budget goal has been submitted.</p>

<div class="results">

<p><strong>Name:</strong> <span id="name"></span></p>

<p><strong>Income:</strong> <span id="income"></span></p>

<p><strong>Goal:</strong> <span id="goal"></span></p>

<p><strong>Category:</strong> <span id="category"></span></p>

</div>

</main>

<footer>

<p>©2026 Finance Hub</p>

</footer>

<script>

const params =
new URLSearchParams(window.location.search);

document.querySelector("#name").textContent =
params.get("name");

document.querySelector("#income").textContent =
params.get("income");

document.querySelector("#goal").textContent =
params.get("goal");

document.querySelector("#category").textContent =
params.get("category");

</script>

</body>

</html>
