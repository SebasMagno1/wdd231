<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Finance Dashboard</title>

<meta name="description" content="Dynamic Finance Dashboard">

<meta name="author" content="Jose Sebastian Escobar Salinas">

<link rel="stylesheet" href="styles/styles.css">
<link rel="stylesheet" href="styles/large.css">

<script type="module" src="scripts/main.js" defer></script>
<script type="module" src="scripts/dashboard.js" defer></script>

</head>

<body>

<header>

<h1>Finance Dashboard</h1>

<button id="menu">☰</button>

<nav>

<ul class="navigation">

<li><a href="index.html">Home</a></li>

<li><a class="active" href="dashboard.html">Dashboard</a></li>

<li><a href="resources.html">Resources</a></li>

<li><a href="form.html">Budget Form</a></li>

</ul>

</nav>

</header>

<main>

<section class="statistics">

<div class="stat">

<h2>Total Transactions</h2>

<p id="transactionCount">15</p>

</div>

<div class="stat">

<h2>Total Amount</h2>

<p id="total">$0</p>

</div>

<div class="stat">

<h2>Favorite Category</h2>

<p id="favorite">All</p>

</div>

</section>

<section>

<h2>Filter Transactions</h2>

<select id="filter">

<option value="all">All</option>

<option value="Food">Food</option>

<option value="Transportation">Transportation</option>

<option value="Savings">Savings</option>

<option value="Entertainment">Entertainment</option>

</select>

</section>

<section id="cards">

</section>

<dialog id="transactionModal">

<h2 id="modalTitle"></h2>

<p id="modalDate"></p>

<p id="modalAmount"></p>

<p id="modalDescription"></p>

<button id="closeModal">
Close
</button>

</dialog>

</main>

<footer>

<p>©2026 Finance Hub</p>

</footer>

</body>

</html>
